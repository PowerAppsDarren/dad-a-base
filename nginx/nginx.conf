# =============================================
# Dad-a-Base Nginx Configuration
# "Why did nginx cross the road?
#  To reverse proxy the other side!"
# =============================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting (even dad jokes need protection)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    upstream api_backend {
        server api:8000;
    }

    upstream web_frontend {
        server web:80;
    }

    server {
        listen 80;
        server_name _;

        # Health check for nginx itself
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx","message":"The reverse pun-roxy is running!"}';
            add_header Content-Type application/json;
        }

        # API routes - proxy to FastAPI
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # Strip /api prefix when proxying
            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Frontend - proxy to React (served via nginx in web container)
        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
